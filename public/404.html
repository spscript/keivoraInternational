<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ARAVVAT INTERNATIONAL P</title>
    <script type="text/javascript">
      // Redirects deep links to index.html with the path encoded in the
      // query string, so client-side routing can restore it (GitHub Pages
      // has no server-side rewrite for SPA routes).
      var pathSegmentsToKeep = 1; // keep "/keivoraInternational"

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
